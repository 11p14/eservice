<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>পাসওয়ার্ড রিসেট — লার্নিংহাব</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="form-card">
  <h2>পাসওয়ার্ড রিসেট</h2>

  <div id="step-request">
    <div class="field">
      <label>ইমেইল</label>
      <input type="email" id="fp-email">
    </div>
    <button class="btn" style="width:100%" onclick="requestReset()">কোড পাঠান</button>
    <p class="msg" id="fp-msg1"></p>
  </div>

  <div id="step-reset" class="hidden">
    <div class="field">
      <label>OTP কোড</label>
      <input type="text" id="fp-otp">
    </div>
    <div class="field">
      <label>নতুন পাসওয়ার্ড</label>
      <input type="password" id="fp-newpass">
    </div>
    <button class="btn" style="width:100%" onclick="resetPassword()">পাসওয়ার্ড পরিবর্তন করুন</button>
    <p class="msg" id="fp-msg2"></p>
  </div>

  <p class="switch-link"><a href="login.html">লগইন পেজে ফিরে যান</a></p>
</div>

<script src="../js/api.js"></script>
<script>
let fpEmail = '';

async function requestReset() {
  fpEmail = document.getElementById('fp-email').value.trim();
  const msg = document.getElementById('fp-msg1');
  const res = await apiPost({ action: 'forgotPassword', email: fpEmail });
  if (res.ok) {
    document.getElementById('step-request').classList.add('hidden');
    document.getElementById('step-reset').classList.remove('hidden');
  } else {
    msg.textContent = res.error || 'সমস্যা হয়েছে';
    msg.className = 'msg error';
  }
}

async function resetPassword() {
  const otp = document.getElementById('fp-otp').value.trim();
  const newPassword = document.getElementById('fp-newpass').value;
  const msg = document.getElementById('fp-msg2');
  const res = await apiPost({ action: 'resetPassword', email: fpEmail, otp, newPassword });
  if (res.ok) {
    msg.textContent = 'পাসওয়ার্ড পরিবর্তন সম্পন্ন! লগইন করুন।';
    msg.className = 'msg success';
    setTimeout(() => window.location.href = 'login.html', 1200);
  } else {
    msg.textContent = res.error || 'সমস্যা হয়েছে';
    msg.className = 'msg error';
  }
}
</script>
</body>
</html>
