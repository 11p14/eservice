<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>আমার প্রোফাইল — লার্নিংহাব</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  .avatar-wrap { display:flex; flex-direction:column; align-items:center; gap:10px; margin-bottom:20px; }
  .avatar {
    width:96px; height:96px; border-radius:50%; object-fit:cover;
    border:3px solid var(--gold); background:var(--cream-2);
  }
  .avatar-placeholder {
    width:96px; height:96px; border-radius:50%; background:var(--cream-2);
    display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:0.8rem;
    border:3px solid var(--gold);
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="nav-wrap">
    <a class="brand" href="../index.html">লার্নিং<span>হাব</span></a>
    <nav class="main-nav"><ul><li><a href="../index.html">হোম</a></li></ul></nav>
    <div id="auth-area"></div>
  </div>
</header>

<div class="form-card hidden" id="not-logged-in" style="text-align:center;">
  <h2>লগইন করা নেই</h2>
  <p style="color:var(--muted)">প্রোফাইল দেখতে/এডিট করতে আগে লগইন করুন।</p>
  <a class="btn" href="login.html">লগইন করুন</a>
</div>

<div class="form-card hidden" id="profile-box">
  <h2>আমার প্রোফাইল</h2>

  <div class="avatar-wrap">
    <img id="avatar-img" class="avatar hidden" alt="প্রোফাইল ছবি">
    <div id="avatar-placeholder" class="avatar-placeholder">ছবি নেই</div>
    <input type="file" id="photo-input" accept="image/*">
  </div>

  <div class="field">
    <label>ইমেইল</label>
    <input type="text" id="p-email" disabled>
  </div>
  <div class="field">
    <label>মোবাইল নম্বর</label>
    <input type="text" id="p-mobile" disabled>
  </div>
  <div class="field">
    <label>নাম</label>
    <input type="text" id="p-name" placeholder="আপনার পূর্ণ নাম">
  </div>
  <div class="field">
    <label>ঠিকানা (ঐচ্ছিক)</label>
    <input type="text" id="p-address" placeholder="যেমন: ঢাকা, বাংলাদেশ">
  </div>

  <button class="btn" style="width:100%" onclick="saveProfile()">সেভ করুন</button>
  <p class="msg" id="p-msg"></p>
</div>

<footer class="site-footer">&copy; <span id="year"></span> লার্নিংহাব</footer>

<script src="../js/api.js"></script>
