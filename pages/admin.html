<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>অ্যাডমিন প্যানেল — লার্নিংহাব</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="form-card" id="admin-login-box">
  <h2>অ্যাডমিন লগইন</h2>
  <div class="field">
    <label>ইউজারনেম</label>
    <input type="text" id="hmknc3@gmail.com">
  </div>
  <div class="field">
    <label>পাসওয়ার্ড</label>
    <input type="password" id="01918904907">
  </div>
  <button class="btn" style="width:100%" onclick="adminLogin()">লগইন</button>
  <p class="msg" id="admin-login-msg"></p>
</div>

<div class="container hidden" id="admin-panel">
  <h2 class="section-title">নতুন কনটেন্ট যোগ করুন</h2>
  <div class="form-card" style="margin:0 0 30px;max-width:100%;">
    <div class="field">
      <label>ক্যাটাগরি (যেমন: ebook, grammar, paragraph, story, letter)</label>
      <input type="text" id="c-category">
    </div>
    <div class="field">
      <label>সাব-ক্যাটাগরি (ঐচ্ছিক)</label>
      <input type="text" id="c-subcategory">
    </div>
    <div class="field">
      <label>টাইটেল</label>
      <input type="text" id="c-title">
    </div>
    <div class="field">
      <label>বিবরণ</label>
      <input type="text" id="c-description">
    </div>
    <div class="field">
      <label>PDF/ফাইল লিংক (Google Drive শেয়ার লিংক)</label>
      <input type="text" id="c-fileurl">
    </div>
    <button class="btn" onclick="addContent()">যোগ করুন</button>
    <p class="msg" id="c-msg"></p>
  </div>

  <h2 class="section-title">বিদ্যমান কনটেন্ট</h2>
  <div id="content-list">লোড হচ্ছে…</div>
</div>

<script src="../js/api.js"></script>
<script>
async function adminLogin() {
  const username = document.getElementById('admin-user').value.trim();
  const password = document.getElementById('admin-pass').value;
  const msg = document.getElementById('admin-login-msg');
  const res = await apiPost({ action: 'adminLogin', username, password });
  if (res.ok) {
    Session.setAdminToken(res.token);
    document.getElementById('admin-login-box').classList.add('hidden');
    document.getElementById('admin-panel').classList.remove('hidden');
    loadAllContent();
  } else {
    msg.textContent = res.error || 'ভুল তথ্য';
    msg.className = 'msg error';
  }
}

async function addContent() {
  const payload = {
    action: 'addContent',
    adminToken: Session.getAdminToken(),
    category: document.getElementById('c-category').value.trim(),
    subcategory: document.getElementById('c-subcategory').value.trim(),
    title: document.getElementById('c-title').value.trim(),
    description: document.getElementById('c-description').value.trim(),
    fileUrl: document.getElementById('c-fileurl').value.trim()
  };
  const msg = document.getElementById('c-msg');
  const res = await apiPost(payload);
  if (res.ok) {
    msg.textContent = 'যোগ হয়েছে!';
    msg.className = 'msg success';
    loadAllContent();
  } else {
    msg.textContent = res.error || 'সমস্যা হয়েছে';
    msg.className = 'msg error';
  }
}

async function loadAllContent() {
  const box = document.getElementById('content-list');
  const res = await apiGet({ action: 'getContent' });
  if (!res.ok || !res.data.length) { box.innerHTML = '<p>কোনো কনটেন্ট নেই।</p>'; return; }
  box.innerHTML = `<div class="card-grid">` + res.data.map(item => `
    <div class="card">
      <h3>${item.Title} <small style="color:var(--muted)">(${item.Category})</small></h3>
      <p>${item.Description || ''}</p>
      <div class="card-footer">
        <button class="btn danger" onclick="deleteContent('${item.Id}')">মুছুন</button>
      </div>
    </div>
  `).join('') + `</div>`;
}

async function deleteContent(id) {
  if (!confirm('মুছে ফেলতে চান?')) return;
  const res = await apiPost({ action: 'deleteContent', adminToken: Session.getAdminToken(), id });
  if (res.ok) loadAllContent();
}

// পেজ লোড হলে যদি আগে থেকে অ্যাডমিন লগইন করা থাকে
if (Session.isAdmin()) {
  document.getElementById('admin-login-box').classList.add('hidden');
  document.getElementById('admin-panel').classList.remove('hidden');
  loadAllContent();
}
</script>
</body>
</html>
